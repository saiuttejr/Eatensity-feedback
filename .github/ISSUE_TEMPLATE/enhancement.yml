name: "\U0001F5E3\uFE0F Suggestion"
description: An existing feature could be improved
title: "[Suggestion]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have a suggestion for improving something that already exists? Let us know.

  - type: textarea
    id: what
    attributes:
      label: What could be improved?
      description: Describe the current experience and what you'd like to see changed.
      placeholder: "Currently... it would be better if..."
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why would this help?
      description: How would this change improve the experience?
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Attach any relevant screenshots if available.
    validations:
      required: false
