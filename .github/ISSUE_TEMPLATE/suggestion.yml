name: "\U0001F4A1 Feature Request"
description: Suggest a new feature or capability
title: "[Feature]: "
labels: ["feature-request"]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear your idea. Please describe the feature and why it would be useful.

  - type: textarea
    id: idea
    attributes:
      label: Describe the feature
      description: What would you like the app to do?
      placeholder: "It would be useful if..."
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why would this be valuable?
      description: What problem would it solve or what would it improve?
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Visuals or references
      description: Screenshots, mockups, or links to similar features in other apps.
    validations:
      required: false
