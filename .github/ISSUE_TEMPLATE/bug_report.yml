name: 🐛 Bug Report
description: Report a bug or something that isn't working correctly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: "When I tap on..., the app shows..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the bug?
      placeholder: |
        1. Go to...
        2. Click on...
        3. Scroll down to...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Where did you encounter the bug?
      options:
        - Web (eatensity.com)
        - Android app
        - iOS app
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device & OS
      description: "E.g. iPhone 15 / iOS 18, Samsung Galaxy S24 / Android 15, Chrome 125 / Windows 11"
      placeholder: "Device / OS"
    validations:
      required: false

  - type: input
    id: app-version
    attributes:
      label: App version
      description: "Check in Settings or About screen. E.g. v2.7.0"
      placeholder: "v2.7.0"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / recordings
      description: Drag and drop images or recordings here if available.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help us debug this?
    validations:
      required: false
