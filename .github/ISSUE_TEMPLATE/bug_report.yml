name: "\U0001F41B Bug Report"
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please describe the issue — we'll follow up if we need more detail.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue you encountered.
      placeholder: "When I tried to..., the app..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: If you can recall the steps, they help us investigate faster.
      placeholder: |
        1. Go to...
        2. Tap on...
        3. See...
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Web (eatensity.com)
        - Android app
        - iOS app
        - Not sure
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device & OS
      description: "E.g. iPhone 15 / iOS 18, Chrome on Windows 11, Samsung Galaxy S24"
      placeholder: "Device / OS / Browser"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Attach screenshots or recordings if available.
    validations:
      required: false
